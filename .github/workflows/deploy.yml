name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy by hand from the Actions tab without a new commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; queue them and drop superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `output: "export"` writes the static site to ./out.
      # NEXT_PUBLIC_* is inlined at build time; set the repo variable
      # QUOTE_ENDPOINT to point the contact form somewhere other than the
      # default (https://api.vespo.io/quote) — e.g. a *.workers.dev URL.
      - run: npm run build
        env:
          NEXT_PUBLIC_QUOTE_ENDPOINT: ${{ vars.QUOTE_ENDPOINT }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
